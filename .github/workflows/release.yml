name: Release to Factorio Mod Portal

# Manual release pipeline. Run it from the Actions tab after merging PRs:
# it bumps the version, generates a changelog entry with GitHub Models,
# packages the mod, commits + tags the release, and uploads to the portal.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (ignored if 'custom_version' is set)"
        type: choice
        options: [patch, minor, major]
        default: patch
      custom_version:
        description: "Exact version like 0.3.0 (overrides bump). Leave blank to use bump."
        type: string
        default: ""
      publish_to_portal:
        description: "Upload the built zip to the Factorio mod portal"
        type: boolean
        default: true
      skip_changelog:
        description: "Don't generate an entry; use changelog.txt exactly as committed"
        type: boolean
        default: false
      dry_run:
        description: "Preview only: build + changelog, but do NOT commit, tag, push or publish"
        type: boolean
        default: false

permissions:
  contents: write   # commit the version bump + changelog and push the tag
  models: read      # call GitHub Models for the changelog draft

concurrency:
  group: factorio-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history + tags to diff since last release

      - name: Compute new version
        id: version
        run: |
          python3 .github/scripts/bump_version.py \
            --info info.json \
            --bump "${{ inputs.bump }}" \
            --custom "${{ inputs.custom_version }}" \
            >> "$GITHUB_OUTPUT"

      - name: Collect changes since last changelog update
        if: ${{ inputs.skip_changelog == false }}
        id: changes
        run: |
          bash .github/scripts/collect_changes.sh \
            "${{ steps.version.outputs.version }}" \
            lmst2 LightningMaster

      - name: Generate changelog entry (GitHub Models)
        if: ${{ inputs.skip_changelog == false }}
        id: ai
        continue-on-error: true   # fall back to the raw commit list on any failure
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 800
          system-prompt: |
            You write changelog entries for a Factorio mod, in the official
            Factorio changelog style. Output ONLY category blocks, nothing else:
            no version line, no date, no separators, no prose, no code fences.
            Each category is a single line ending with a colon, chosen ONLY from:
              Major Features, Features, Minor Features, Graphics, Sounds,
              Optimizations, Balancing, Changes, Bugfixes, Gui, Scripting, Locale
            Under each category, put one "- " bullet per change, written for
            players (concise, imperative-past, no commit hashes). Do not name
            authors except via an explicit "(thanks @handle)" credit when the
            user prompt asks for one.
            Group related commits, drop noise like "merge", "wip", "typo".
            Ignore commits that only touch CI, workflows, build tooling, docs or
            repository setup - they are not player-facing.
            Example:
              Features:
              - Added a freezing unloading bay for space platforms
              Bugfixes:
              - Fixed a crash when mining a fridge
          prompt-file: user_prompt.txt

      - name: Save model output
        if: ${{ inputs.skip_changelog == false }}
        run: |
          if [ -n "${{ steps.ai.outputs.response-file }}" ] && [ -f "${{ steps.ai.outputs.response-file }}" ]; then
            cp "${{ steps.ai.outputs.response-file }}" ai.txt
            echo "Model draft:"; cat ai.txt
          else
            echo "No model output; assemble step will fall back to the commit list."
            : > ai.txt
          fi

      - name: Assemble & validate changelog
        if: ${{ inputs.skip_changelog == false }}
        run: |
          python3 .github/scripts/assemble_changelog.py \
            --version "${{ steps.version.outputs.version }}" \
            --date "$(date -u +%Y-%m-%d)" \
            --ai-file ai.txt \
            --drafts-file drafts.txt \
            --commits-file commits.txt \
            --changelog changelog.txt

      - name: Validate changelog format
        run: python3 .github/scripts/validate_changelog.py changelog.txt

      - name: Write version into info.json
        run: |
          python3 .github/scripts/bump_version.py \
            --info info.json \
            --custom "${{ steps.version.outputs.version }}" \
            --write

      - name: Build mod zips (one per Factorio branch)
        id: build
        run: |
          MOD="$(python3 -c 'import json;print(json.load(open("info.json"))["name"])')"
          VER="${{ steps.version.outputs.version }}"

          # factorio_version is an exact major.minor match, not a range, so a
          # single release cannot serve both branches. One source tree is
          # stamped and packaged twice; the portal then hands each player the
          # release matching their game.
          build_variant () {
            local target="$1" base="$2"
            local stage="build/${target}/${MOD}_${VER}"
            mkdir -p "$stage"
            # tar rather than rsync: fewer assumptions about the runner, and a
            # staging failure aborts instead of quietly producing an empty zip.
            tar -C . \
              --exclude='./.git' --exclude='./.github' --exclude='./build' \
              --exclude='./.gitignore' --exclude='*.zip' \
              --exclude='./commits.txt' --exclude='./ai.txt' --exclude='./user_prompt.txt' \
              --exclude='./attributed_commits.txt' --exclude='./contributors.txt' \
              --exclude='./drafts.txt' \
              -cf - . | tar -C "$stage" -xf -
            rm -f "$stage/Changelog.txt"
            python3 - "$stage/info.json" "$target" "$base" <<'PYEOF'
          import json, sys
          path, target, base = sys.argv[1], sys.argv[2], sys.argv[3]
          d = json.load(open(path))
          d["factorio_version"] = target
          d["dependencies"] = [f"base >= {base}"] + [
              x for x in d.get("dependencies", []) if not x.startswith("base")]
          json.dump(d, open(path, "w"), indent=2, ensure_ascii=False)
          PYEOF
            local zipname="${MOD}_${VER}_factorio-${target}.zip"
            ( cd "build/${target}" && zip -r -X "../../${zipname}" "${MOD}_${VER}" >/dev/null )

            # Never ship a package we have not looked inside. An empty or
            # truncated zip is the one defect that reaches every player at once.
            local n
            n="$(unzip -l "$zipname" | tail -1 | awk '{print $2}')"
            [ "${n:-0}" -ge 20 ] || { echo "::error::$zipname has only ${n:-0} entries"; exit 1; }
            for req in info.json control.lua data.lua settings.lua changelog.txt; do
              unzip -l "$zipname" | grep -q "${MOD}_${VER}/${req}" \
                || { echo "::error::$zipname is missing $req"; exit 1; }
            done
            unzip -p "$zipname" "${MOD}_${VER}/info.json" \
              | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['factorio_version']=='$target', d['factorio_version']
          assert d['version']=='$VER', d['version']
          print(f\"    verified: {d['name']} {d['version']} for Factorio {d['factorio_version']} ({len(sys.argv)})\")" \
              || { echo "::error::$zipname failed info.json verification"; exit 1; }
            echo "built $zipname ($n entries, factorio_version=${target}, base >= ${base})"
          }

          build_variant 2.0 2.0.2
          build_variant 2.1 2.1.2

          echo "mod=${MOD}" >> "$GITHUB_OUTPUT"
          echo "zip20=${MOD}_${VER}_factorio-2.0.zip" >> "$GITHUB_OUTPUT"
          echo "zip21=${MOD}_${VER}_factorio-2.1.zip" >> "$GITHUB_OUTPUT"
          ls -la ./*.zip

      - name: Upload zip as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.mod }}_${{ steps.version.outputs.version }}
          path: "*.zip"

      - name: Commit, tag and push
        if: ${{ inputs.dry_run == false }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f commits.txt ai.txt user_prompt.txt attributed_commits.txt contributors.txt drafts.txt
          git add info.json changelog.txt
          git diff --cached --quiet || git commit -m "Release ${VER}"
          # Idempotent: a retried run (e.g. after a failed portal upload) must
          # not die because the commit/tag already exist.
          git rev-parse -q --verify "refs/tags/v${VER}" >/dev/null || git tag "v${VER}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${VER}" || echo "tag v${VER} already pushed"

      - name: Publish to Factorio Mod Portal
        if: ${{ inputs.dry_run == false && inputs.publish_to_portal == true }}
        env:
          FACTORIO_MOD_PLATFORM_KEY: ${{ secrets.FACTORIO_MOD_PLATFORM_KEY }}
        run: |
          # Same mod version, two releases - the portal keys them by the
          # factorio_version inside each zip.
          bash .github/scripts/publish_portal.sh "${{ steps.build.outputs.mod }}" "${{ steps.build.outputs.zip20 }}"
          bash .github/scripts/publish_portal.sh "${{ steps.build.outputs.mod }}" "${{ steps.build.outputs.zip21 }}"

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Factorio release"
            echo ""
            echo "- Version: \`${{ steps.version.outputs.version }}\` (was \`${{ steps.version.outputs.previous }}\`)"
            echo "- Zips: \`${{ steps.build.outputs.zip20 }}\`, \`${{ steps.build.outputs.zip21 }}\`"
            echo "- Dry run: \`${{ inputs.dry_run }}\`"
            echo "- Published to portal: \`${{ inputs.dry_run == false && inputs.publish_to_portal == true }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
